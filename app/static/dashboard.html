<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RedisOps Field Console</title>
  <style>
    :root {
      --paper: #f4efdf;
      --ink: #18201d;
      --muted: #66706a;
      --line: #c9c0aa;
      --redis: #b83227;
      --moss: #315f4b;
      --sun: #d9a441;
      --card: rgba(255, 252, 241, .78);
      --serif: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
      --mono: "IBM Plex Mono", "Cascadia Mono", Consolas, monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: var(--mono);
      background:
        radial-gradient(circle at 10% 15%, rgba(217,164,65,.2), transparent 24rem),
        radial-gradient(circle at 90% 5%, rgba(49,95,75,.16), transparent 28rem),
        repeating-linear-gradient(0deg, transparent 0 31px, rgba(24,32,29,.035) 31px 32px),
        var(--paper);
    }
    main { width: min(1180px, calc(100% - 32px)); margin: 0 auto; padding: 38px 0 64px; }
    header { display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: end; border-bottom: 2px solid var(--ink); padding-bottom: 18px; }
    .eyebrow { color: var(--redis); font-size: 12px; letter-spacing: .18em; text-transform: uppercase; }
    h1 { font: 700 clamp(42px, 7vw, 82px)/.88 var(--serif); letter-spacing: -.055em; margin: 8px 0 0; max-width: 780px; }
    h2 { font: 700 28px/1 var(--serif); margin: 0; }
    .connection { display: flex; align-items: center; gap: 9px; font-size: 12px; padding-bottom: 6px; }
    .dot { width: 10px; height: 10px; background: var(--sun); border-radius: 50%; box-shadow: 0 0 0 4px rgba(217,164,65,.18); }
    .dot.live { background: var(--moss); box-shadow: 0 0 0 4px rgba(49,95,75,.18); }
    .metrics { display: grid; grid-template-columns: repeat(5, 1fr); border: 1px solid var(--line); border-right: 0; margin: 26px 0; animation: rise .55s ease both; }
    .metric { padding: 18px; border-right: 1px solid var(--line); background: var(--card); }
    .metric strong { display: block; font: 700 35px/1 var(--serif); }
    .metric span { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .1em; }
    .layout { display: grid; grid-template-columns: minmax(0, 1.7fr) minmax(280px, .8fr); gap: 24px; }
    .panel { border: 1px solid var(--line); background: var(--card); padding: 22px; animation: rise .55s ease both; }
    .panel:nth-child(2) { animation-delay: .08s; }
    .panel-head { display: flex; justify-content: space-between; align-items: baseline; gap: 16px; margin-bottom: 18px; }
    .panel-head small { color: var(--muted); }
    form { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; margin-bottom: 22px; }
    input, button { font: 13px var(--mono); border: 1px solid var(--ink); padding: 11px 12px; background: #fffaf0; color: var(--ink); }
    button { cursor: pointer; background: var(--redis); color: white; border-color: var(--redis); font-weight: 700; }
    button:hover { filter: brightness(.92); }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th { color: var(--muted); font-weight: 400; text-align: left; border-bottom: 1px solid var(--line); padding: 8px 6px; }
    td { border-bottom: 1px dashed var(--line); padding: 11px 6px; }
    .status { display: inline-block; padding: 3px 7px; border-radius: 12px; background: rgba(49,95,75,.12); color: var(--moss); }
    .status.failed { background: rgba(184,50,39,.12); color: var(--redis); }
    .feed, .ranking { list-style: none; padding: 0; margin: 0; }
    .feed li { border-left: 2px solid var(--sun); padding: 0 0 18px 14px; font-size: 12px; }
    .feed time { display: block; color: var(--muted); font-size: 10px; margin-top: 4px; }
    .ranking li { display: grid; grid-template-columns: 28px 1fr auto; padding: 10px 0; border-bottom: 1px dashed var(--line); }
    .rank { color: var(--redis); font-family: var(--serif); font-weight: 700; }
    .empty { color: var(--muted); padding: 18px 0; font-style: italic; }
    .stack { display: grid; gap: 24px; }
    footer { color: var(--muted); font-size: 10px; margin-top: 22px; text-align: right; }
    @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 820px) {
      header, .layout { grid-template-columns: 1fr; }
      .metrics { grid-template-columns: repeat(2, 1fr); }
      .metric:last-child { grid-column: span 2; }
      form { grid-template-columns: 1fr; }
      .connection { justify-self: start; }
    }
  </style>
</head>
<body>
<main>
  <header>
    <div><div class="eyebrow">Redis patterns / live laboratory</div><h1>Field Console</h1></div>
    <div class="connection"><span class="dot" id="dot"></span><span id="connection">connecting to event stream</span></div>
  </header>
  <section class="metrics" id="metrics"></section>
  <div class="layout">
    <section class="panel">
      <div class="panel-head"><h2>Job ledger</h2><small>newest first</small></div>
      <form id="job-form">
        <input id="user-id" value="learner-1" pattern="[a-zA-Z0-9_-]+" aria-label="User ID" required>
        <input id="records" value="100" type="number" min="1" aria-label="Record count" required>
        <button type="submit">Queue report</button>
      </form>
      <div id="jobs"></div>
    </section>
    <div class="stack">
      <section class="panel"><div class="panel-head"><h2>Leaderboard</h2><small>completed</small></div><ol class="ranking" id="leaderboard"></ol></section>
      <section class="panel"><div class="panel-head"><h2>Activity</h2><small>Redis Stream</small></div><ul class="feed" id="activity"></ul></section>
    </div>
  </div>
  <footer>RedisOps Playground · auto-refreshes every 5 seconds</footer>
</main>
<script>
  const $ = (id) => document.getElementById(id);
  const safe = (value) => String(value).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  async function json(path, options) { const r = await fetch(path, options); if (!r.ok) throw new Error(`${r.status} ${path}`); return r.json(); }
  async function refresh() {
    try {
      const [metrics, jobs, leaders, activity] = await Promise.all([json('/metrics'), json('/jobs?limit=12'), json('/leaderboard?limit=6'), json('/activity?limit=8')]);
      $('metrics').innerHTML = [
        ['Pending', metrics.pending_jobs], ['Processing', metrics.processing_jobs], ['Retrying', metrics.retrying_jobs],
        ['Dead letter', metrics.dead_letter_jobs], ['Cache hit / miss', `${metrics.cache_hits} / ${metrics.cache_misses}`]
      ].map(([label, value]) => `<div class="metric"><strong>${safe(value)}</strong><span>${label}</span></div>`).join('');
      $('jobs').innerHTML = jobs.items.length ? `<table><thead><tr><th>ID</th><th>User</th><th>Status</th><th>Retries</th></tr></thead><tbody>${jobs.items.map(j => `<tr><td>${safe(j.id.slice(0,8))}</td><td>${safe(j.user_id)}</td><td><span class="status ${safe(j.status)}">${safe(j.status)}</span></td><td>${j.retry_count}/${j.max_retries}</td></tr>`).join('')}</tbody></table>` : '<div class="empty">No jobs recorded yet.</div>';
      $('leaderboard').innerHTML = leaders.items.length ? leaders.items.map(x => `<li><span class="rank">${x.rank}</span><span>${safe(x.user_id)}</span><strong>${x.score}</strong></li>`).join('') : '<li class="empty">Complete a job to enter the board.</li>';
      $('activity').innerHTML = activity.items.length ? activity.items.map(x => `<li>${safe(x.message)}<time>${new Date(x.timestamp).toLocaleTimeString()}</time></li>`).join('') : '<li class="empty">Waiting for activity.</li>';
    } catch (error) { $('connection').textContent = `API unavailable: ${error.message}`; $('dot').classList.remove('live'); }
  }
  $('job-form').addEventListener('submit', async (event) => {
    event.preventDefault();
    await json('/jobs', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({user_id:$('user-id').value, payload:{record_count:Number($('records').value)}})});
    await refresh();
  });
  const events = new EventSource('/events/stream');
  events.onopen = () => { $('dot').classList.add('live'); $('connection').textContent = 'event stream live'; };
  ['job.created','job.started','job.retrying','job.completed','job.failed'].forEach(type => events.addEventListener(type, refresh));
  events.onerror = () => { $('dot').classList.remove('live'); $('connection').textContent = 'event stream reconnecting'; };
  refresh(); setInterval(refresh, 5000);
</script>
</body>
</html>
